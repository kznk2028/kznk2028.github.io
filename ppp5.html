<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポピぱ5</title>
  <style>
    body {
      font-family: '游ゴシック', 'Yu Gothic', sans-serif;
      background-color: #d6c6af;
      color: #5c3a00;
      margin: 0;
    }

    .vertical-images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
    }

    /* 💻 パソコン用（通常） */
    .vertical-images img {
      width: 80vw; /* 画面幅の80%で可変に */
      max-width: 500px; /* 最大500pxまで */
      height: auto;
      display: block;
    }

    /* 📱 スマホ用（幅768px以下） */
    @media (max-width: 768px) {
      .vertical-images img {
        width: 100%;
        max-width: none;
        height: auto;
      }
    }

    .back-link {
      text-align: center;
      margin: 40px 0;
    }

    .back-link a {
      color: #5c3a00;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="vertical-images">
    <img src="ppp5/ppp5-1.PNG" alt="画像1">
    <img src="ppp5/ppp5-2.PNG" alt="画像2">
    <img src="ppp5/ppp5-3.PNG" alt="画像3">
    <img src="ppp5/ppp5-4.PNG" alt="画像4">
    <img src="ppp5/ppp5-5.PNG" alt="画像5">
    <img src="ppp5/ppp5-6.PNG" alt="画像6">
    <img src="ppp5/ppp5-7.PNG" alt="画像7">
    <img src="ppp5/ppp5-8.PNG" alt="画像8">
    <img src="ppp5/ppp5-9.PNG" alt="画像9">
    <img src="ppp5/ppp5-10.PNG" alt="画像10">
    <img src="ppp5/ppp5-11.PNG" alt="画像11">
    <img src="ppp5/ppp5-12.PNG" alt="画像12">
    <img src="ppp5/ppp5-13.PNG" alt="画像13">
    <img src="ppp5/ppp5-14.PNG" alt="画像14">
    <img src="ppp5/ppp5-15.PNG" alt="画像15">
    <img src="ppp5/ppp5-16.PNG" alt="画像16">
    <img src="ppp5/ppp5-17.PNG" alt="画像17">
  </div>

  <p class="back-link">
    <a href="index.html">← メインページに戻る</a>
  </p>
</body>
</html>
