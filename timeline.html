<!doctype html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>無法地帯</title>

<style>

html{
scroll-behavior:smooth;
}

:root{
--bg:#e9dccb;
--panel:#fff9f2;
--accent:#b0895a;
--muted:#cdb89d;
--shadow:0 6px 18px rgba(0,0,0,0.08);
--radius:12px;
--max-width:1200px;
--text:#5c3a00;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Yu Gothic UI","游ゴシック体","Hiragino Kaku Gothic ProN",sans-serif;
background:linear-gradient(180deg,var(--bg),#e7d7c4 60%);
color:var(--text);
padding:60px 10px 60px;
display:flex;
justify-content:center;
font-size:18px;
}

/* 全体 */

.wrapper{
width:100%;
max-width:var(--max-width);
}

/* レイアウト */

.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:28px;
}

/* タイムライン */

.timeline{
display:flex;
flex-direction:column;
gap:18px;
}

/* 投稿 */

.post{
display:flex;
gap:12px;
background:var(--panel);
padding:18px;
border-radius:var(--radius);
box-shadow:var(--shadow);
transition:.2s;
}

.post:hover{
transform:translateY(-3px);
}

.post-avatar{
width:40px;
height:40px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
}

.post-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.post-body{
flex:1;
}

.date{
font-size:12px;
opacity:.6;
margin-top:6px;
}

/* サイド */

.sidebar{
display:flex;
flex-direction:column;
gap:18px;
}

.box{
background:var(--panel);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.box h3{
margin-top:0;
font-size:20px;
margin-bottom:12px;
}

/* アバター */

.avatar{
width:80px;
height:80px;
border-radius:50%;
overflow:hidden;
margin-bottom:10px;
background:var(--muted);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* スマホ */

@media(max-width:800px){
.layout{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="wrapper">

<div class="layout">

<!-- タイムライン -->

<div>

<div class="timeline">

<!-- 新しい日記はここに追加 -->

<div class="post">

<div class="post-avatar">
<img src="top/wako_2.PNG">
</div>

<div class="post-body">

<p>
一向に絵が上達しないのはなぜですか？？
</p>

<div class="date">2026-03-12</div>

</div>

</div>

<div class="post">

<div class="post-avatar">
<img src="top/wako_2.PNG">
</div>

<div class="post-body">

<p>
オリジナルキャラをまとめたいなあと思いつつ数か月が経過した。
</p>

<div class="date">2026-03-11</div>

</div>

</div>

<div class="post">

<div class="post-avatar">
<img src="top/wako_2.PNG">
</div>

<div class="post-body">

<p>
凡人ですこんにちは。
</p>

<div class="date">2026-03-10</div>

</div>

</div>

</div>

</div>

<!-- 右サイド -->

<div class="sidebar">

<div class="box">

<div class="avatar">
<img src="top/wako_2.PNG">
</div>

<h3>わこも</h3>

<p>
ポピぱとえぶホスに脳を焼かれた人
</p>

</div>

</div>

</div>

</div>

</body>
</html>
