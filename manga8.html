<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漫画8</title>
  <style>
    body {
      font-family: '游ゴシック', 'Yu Gothic', sans-serif;
      background-color: #d6c6af;
      color: #5c3a00;
      margin: 0;
    }

    .vertical-images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
    }

    /* 💻 パソコン用（通常） */
    .vertical-images img {
      width: 80vw; /* 画面幅の80%で可変に */
      max-width: 500px; /* 最大500pxまで */
      height: auto;
      display: block;
    }

    /* 📱 スマホ用（幅768px以下） */
    @media (max-width: 768px) {
      .vertical-images img {
        width: 100%;
        max-width: none;
        height: auto;
      }
    }

    .back-link {
      text-align: center;
      margin: 40px 0;
    }

    .back-link a {
      color: #5c3a00;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="vertical-images">
    <img src="manga8/manga8-1.png" alt="画像1">
    <img src="manga8/manga8-2.png" alt="画像2">
    <img src="manga8/manga8-3.png" alt="画像3">
    <img src="manga8/manga8-4.png" alt="画像4">
  </div>

  <p class="back-link">
    <a href="index.html">← メインページに戻る</a>
  </p>
</body>
</html>
